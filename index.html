<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kanban Board</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"/>
  <link href="https://fonts.googleapis.com" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
</head>
<body>
  <div class="body-container">

    <!-------------------------THIS IS FOR THE NAVIGATION TAB--------------------------------->
    <nav>
      <div class="app-title">
        <div class="text-title">
          <h1>Kanban Board</h1>
        </div>
      </div>

      <div class="list-container">
        <div class="list-container-title">
          Master List
        </div>

        <div class="search-container">
          <div class="search-bar">
            <i class="fa-solid fa-magnifying-glass"></i>
            <input type="text" placeholder="Search...">
          </div>
        </div>

        <div class="add-new-topic-btn">
          <button><i class="fa-solid fa-plus"></i> <span>Add</span></button>
        </div>

        <div class="master-list-container">
          <ul>
          </ul>
        </div>
      </div>
    </nav>




    <!-------------------------THIS IS FOR THE MAIN TAB--------------------------------->
    <main>

      <div class="category-title">
        <h1>SAMPLE TASK</h1>
      </div>

      <div class="newtask-filter-tab">
        <div class="new-task-btn">
          <i class="fa-solid fa-plus"></i>
          <span>New Task</span>
        </div>

        <div class="filter-btn-wrapper">
          <div class="filter-btn">
            <i class="fa-solid fa-filter"></i>
            <span>filter</span>
          </div>

          <div class="filter-options-container">
            <div class="filter-options-inset-container">
              <div class="search-task-title">
                <i class="fa-solid fa-magnifying-glass"></i>
                <input type="text" placeholder="Search title...">
              </div>
              <div class="filter-other-options">
                <div class="filter-no-dates filter-option">
                  <label>
                    <input type="checkbox">
                    <span>No Dates</span>
                  </label>
                </div>
                <div class="filter-no-titles filter-option"> 
                  <label>
                    <input type="checkbox">
                    <span>No Titles</span>
                  </label>
                </div>
                <div class="filter-no-description filter-option">
                  <label>
                    <input type="checkbox">
                    <span>No Description</span>
                  </label>
                </div>
                <div class="filter-urgent filter-option">
                  <label>
                    <input type="checkbox">
                    <span>Urgent</span>
                  </label>
                </div>
              </div>
            </div>
          </div>
        </div>

      </div>

      <!-------------------------PUT THIS ON POSITION ABSOLUTE AND INSET 0--------------------------------->



      <!--PROGRESSION CONTAINER-->
      <div class="progression-content-container">

        <div class="todo-container">
          <div class="todo-progression-container">
            <div class="todo-progression">
              <span class="progression-title">To Do</span>
              <span class="progression-count progression-count-todo">0</span>
            </div>
          </div>
          <div class="todo-progress-list progression-list" data-column="todo">
            <ul>


            </ul>
          </div>
        </div>

        <div class="doing-container">
          <div class="doing-progression-container">
            <div class="doing-progression">
              <span class="progression-title">Doing</span>
              <span class="progression-count progression-count-doing">0</span>
            </div>
          </div>
          <div class="doing-progress-list progression-list" data-column="doing">
            <ul>

            </ul>
          </div>
        </div>

        <div class="done-container">
          <div class="done-progression-container">
            <div class="done-progression">
              <span class="progression-title">Done</span>
              <span class="progression-count progression-count-done">0</span>
            </div>
          </div>
          <div class="done-progress-list progression-list" data-column="done">
            <ul>

            </ul> 
            
          </div>
        </div>




        <!------------------------------------THIS IS FOR MODAL-------------------------------->
        <div class="modal">
          <div class="modal-background-container">
            <div class="modal-inset-container">


              <div class="exit-button-container">
                <i class="fa-solid fa-xmark"></i>
              </div>
              <div class="modal-title-container">
                <div class="modal-title-input">
                  <input type="text" placeholder="Enter title...">
                </div>
                <div class="modal-edit-title-input">
                  <i class="fa-solid fa-pen-to-square"></i>
                </div>
              </div>



              <div class="modal-description-container">
                <textarea cols="10" rows="10" placeholder="Enter description..."></textarea>
              </div>



              <div class="modal-details-container">
                <div class="modal-comment-display">
                  <i class="fa-regular fa-comment"></i>
                  <p>0</p>
                </div>
                <div class="modal-date-display">
                  <i class="fa-regular fa-calendar"></i>
                  <div class="modal-calendar-selection">
                    <p id="date-text">No Date</p> 
                  </div>
                  <input type="text" id="task-date" class="hidden-date-input">
                </div>
                <div class="modal-flag-review">
                  <i class="fa-regular fa-flag"></i>
                </div>
              </div>

              <div class="comment-section">
                <div class="comment-list">
                  <ul class="comment-ul">

                    <li>
                      <div class="modal-comment-container">
                        <div class="modal-comment-date-time">
                          <div class="comment-date">
                            <p>November 9, 2000</p>
                          </div>
                          <div class="comment-time">
                            <p>6:00 PM</p>
                          </div>
                        </div>
                        <div class="modal-comment-content">
                          <p>Testing comment container...</p>
                        </div>
                      </div>
                    </li>


                  </ul>
                </div>
                <div class="comment-input-container">
                  <input type="text" placeholder="Add a comment...">
                  <button>Add</button>
                </div>
              </div>
              


            </div>
          </div>
        </div>






        <!------------------------------------THIS IS FOR DATA INFORMATION-------------------------------->
        <div class="data-container">

          <div class="total-tasks-container">
            <div class="total-tasks">
              <div class="total-task-title">
                <h2>Total Tasks</h2>
              </div>
              <div class="number-of-tasks">
                <div class="number">
                  <h3>0</h3>
                </div>
                <div class="new-update">
                  <div class="arrow-up-down">
                    <!-- <i class="fa-solid fa-caret-up"></i> -->
                    <!-- <i class="fa-solid fa-caret-down"></i> -->
                    <i class="fa-solid fa-angles-up"></i>
                    <!-- <i class="fa-solid fa-angles-down"></i> -->
                  </div>
                  <div class="numbers-added-subtracted">
                    <span></span>
                    <span></span>
                  </div>
                </div>
              </div>
            </div>
          </div>


          <div class="data-graph-container">
            <div class="data-graph">
              <div class="chart-js">
                 <canvas id="myChart" width="300" height="300"></canvas>
              </div>
            </div>
          </div>

        </div>



      </div>

    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="script.js"></script>
  <script src="chart.js"></script>
</body>
</html>
